<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prompt Library</title>
<link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a1a;
    --surface: #242424;
    --surface-h: #2c2c2c;
    --surface3: #313131;
    --border: rgba(255,255,255,0.08);
    --border-h: rgba(255,255,255,0.14);
    --text: #f3f3f3;
    --muted: #9b9b9b;
    --muted2: #6e6e6e;
    --accent: #3b9edd;
    --accent-h: #2e8bc9;
    --step1: #3ecf8e;
    --step1-dim: rgba(62,207,142,0.1);
    --step1-border: rgba(62,207,142,0.22);
    --step2: #9b8afb;
    --step2-dim: rgba(155,138,251,0.1);
    --step2-border: rgba(155,138,251,0.22);
    --danger: #e05252;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --mono: 'Cascadia Code', 'Consolas', monospace;
    --r: 12px;
    --r-sm: 8px;
    --r-xs: 6px;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ── TOPBAR ── */
  .topbar {
    height: 52px;
    background: #1f1f1f;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 10px;
  }
  .topbar-logo {
    width: 24px; height: 24px;
    background: linear-gradient(135deg, #3b9edd, #60c8f5);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .topbar-logo svg { width: 14px; height: 14px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
  .topbar-name { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.1px; }

  /* ── PAGE LAYOUT ── */
  .page { max-width: 1260px; margin: 0 auto; padding: 44px 48px 0; }

  /* ── PAGE HEADER ── */
  .page-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 28px; gap: 20px; flex-wrap: wrap;
  }
  .page-title { font-size: 26px; font-weight: 700; letter-spacing: -0.4px; color: var(--text); }

  /* ── TABS BAR ── */
  .tabs-bar {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
    flex-wrap: wrap;
  }

  .tab-btn {
    position: relative;
    display: flex; align-items: center; gap: 7px;
    padding: 9px 16px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    background: none;
    border: none;
    border-radius: var(--r-xs) var(--r-xs) 0 0;
    cursor: pointer;
    transition: color 0.13s, background 0.13s;
    white-space: nowrap;
    bottom: -1px;
    border-bottom: 2px solid transparent;
  }
  .tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .tab-btn.active {
    color: var(--text);
    font-weight: 600;
    border-bottom: 2px solid var(--accent);
  }

  .tab-count {
    font-size: 11px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 20px;
    background: var(--surface3);
    color: var(--muted);
    min-width: 18px;
    text-align: center;
  }
  .tab-btn.active .tab-count {
    background: rgba(59,158,221,0.18);
    color: #60c8f5;
  }

  /* ── CATEGORIES LIST ── */
  #lib { display: flex; flex-direction: column; gap: 12px; }

  /* ── CATEGORY ROW ── */
  .cat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
    animation: up 0.28s ease both;
    transition: background 0.15s, border-color 0.15s;
  }
  .cat-card:hover { background: var(--surface-h); border-color: var(--border-h); }
  @keyframes up { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: none; } }

  /* ── CAT HEADER ── */
  .cat-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .cat-left { display: flex; align-items: center; gap: 14px; }
  .cat-avatar { width: 40px; height: 40px; border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .cat-avatar svg { width: 40px; height: 40px; display: block; }
  .cat-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .cat-meta { font-size: 12px; color: var(--muted); margin-top: 1px; }

  /* ── CAT HEADER RIGHT (tab assign dropdown) ── */
  .cat-tab-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 500;
    padding: 3px 9px; border-radius: 20px;
    background: var(--surface3); color: var(--muted);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
    position: relative;
    user-select: none;
    white-space: nowrap;
  }
  .cat-tab-badge:hover { background: rgba(255,255,255,0.07); border-color: var(--border-h); color: var(--text); }
  .cat-tab-badge svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; opacity: 0.6; }

  .tab-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    min-width: 180px;
    background: #2a2a2a;
    border: 1px solid var(--border-h);
    border-radius: var(--r-sm);
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    z-index: 50;
    overflow: hidden;
    animation: fadeDown 0.12s ease;
  }
  .tab-dropdown.open { display: block; }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }

  .dropdown-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 14px;
    font-size: 13px; color: var(--muted);
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
    gap: 10px;
  }
  .dropdown-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  .dropdown-item.selected { color: var(--text); font-weight: 600; }
  .dropdown-item .check-icon { width: 13px; height: 13px; stroke: #3b9edd; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

  /* ── STEPS ROW ── */
  .steps-row { display: grid; grid-template-columns: 1fr 1fr; }
  .step-widget { padding: 24px 24px 22px; display: flex; flex-direction: column; gap: 12px; }
  .step-widget.s1 { border-right: 1px solid var(--border); }

  .step-pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase;
    padding: 3px 10px; border-radius: 100px; width: fit-content;
  }
  .s1 .step-pill { background: var(--step1-dim); color: var(--step1); border: 1px solid var(--step1-border); }
  .s2 .step-pill { background: var(--step2-dim); color: var(--step2); border: 1px solid var(--step2-border); }

  .step-title { font-size: 16px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .step-desc { font-size: 13px; color: var(--muted); line-height: 1.55; flex: 1; }

  .step-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; gap: 8px; }

  .action-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 18px; border-radius: var(--r-sm);
    font-family: var(--font); font-size: 13px; font-weight: 600;
    cursor: pointer; border: 1px solid transparent;
    transition: background 0.15s, opacity 0.15s, transform 0.1s;
  }
  .action-btn:active { transform: scale(0.97); }
  .action-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
  .s1 .action-btn { background: var(--step1-dim); color: var(--step1); border-color: var(--step1-border); }
  .s1 .action-btn:hover { background: rgba(62,207,142,0.16); }
  .s2 .action-btn { background: var(--step2-dim); color: var(--step2); border-color: var(--step2-border); }
  .s2 .action-btn:hover { background: rgba(155,138,251,0.16); }

  .peek-btn {
    width: 34px; height: 34px; border-radius: var(--r-xs);
    background: var(--surface3); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--muted2);
    transition: background 0.12s, color 0.12s, border-color 0.12s; flex-shrink: 0;
  }
  .peek-btn:hover { background: rgba(255,255,255,0.1); color: var(--muted); border-color: var(--border-h); }
  .peek-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center; padding: 64px 24px;
    color: var(--muted2);
    border: 1px dashed rgba(255,255,255,0.1);
    border-radius: var(--r);
  }
  .empty-state svg { width: 32px; height: 32px; stroke: var(--muted2); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; margin-bottom: 12px; opacity: 0.5; }
  .empty-state p { font-size: 14px; }

  /* ── MODALS ── */
  .backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 100;
    align-items: center; justify-content: center;
    padding: 20px; backdrop-filter: blur(6px);
  }
  .backdrop.open { display: flex; }

  .modal {
    background: #2a2a2a; border: 1px solid var(--border-h); border-radius: var(--r);
    width: 100%; max-width: 520px; padding: 24px 26px;
    display: flex; flex-direction: column; gap: 18px;
    animation: min 0.16s ease;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
  }
  @keyframes min { from { opacity:0; transform: scale(0.96) translateY(8px); } to { opacity:1; transform: none; } }

  .modal-hd { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-hd-right { display: flex; align-items: center; gap: 6px; }

  .reset-btn {
    background: none; border: 1px solid var(--border-h); border-radius: var(--r-xs);
    cursor: pointer; color: var(--muted); padding: 4px 10px;
    font-family: var(--font); font-size: 11px; font-weight: 500;
    display: flex; align-items: center; gap: 5px;
    transition: color 0.12s, background 0.12s, border-color 0.12s;
    opacity: 0; pointer-events: none;
  }
  .reset-btn.visible { opacity: 1; pointer-events: auto; }
  .reset-btn:hover { color: var(--text); background: var(--surface3); border-color: var(--border-h); }
  .reset-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

  .close-btn { background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px; border-radius: 4px; transition: color 0.12s; }
  .close-btn:hover { color: var(--text); }
  .close-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

  .modal label { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 6px; }
  .modal textarea {
    width: 100%; background: #1f1f1f; border: 1px solid var(--border-h); border-radius: var(--r-sm);
    padding: 9px 12px; font-family: var(--mono); font-size: 12.5px; color: var(--text);
    outline: none; resize: vertical; line-height: 1.6; transition: border-color 0.15s; min-height: 130px;
  }
  .modal textarea:focus { border-color: var(--accent); }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-cancel {
    background: none; border: 1px solid var(--border-h); border-radius: var(--r-sm);
    padding: 8px 18px; font-family: var(--font); font-size: 13px; color: var(--muted);
    cursor: pointer; transition: background 0.12s, color 0.12s;
  }
  .btn-cancel:hover { background: var(--surface3); color: var(--text); }
  .btn-save {
    background: var(--accent); color: #fff; border: none; border-radius: var(--r-sm);
    padding: 8px 22px; font-family: var(--font); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background 0.12s;
  }
  .btn-save:hover { background: var(--accent-h); }

  @media (max-width: 640px) {
    .page { padding: 24px 16px 0; }
    .steps-row { grid-template-columns: 1fr; }
    .step-widget.s1 { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>

<div class="page">

          <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>

        </button>

  s1: `Using only the information explicitly stated in the attached commodity/material market report, produce a structured pricing driver summary. Do not use external knowledge, assumptions, or inferences beyond explicitly stated causality.

GLOBAL RULES — govern every section without exception

SOURCE FIDELITY: Extract only from the provided document. If information is ambiguous or uncertain, state that explicitly rather than inferring. Do not introduce external knowledge, industry context, or assumptions beyond what is explicitly stated.
DETERMINISM: Output structure, categorization logic, wording, and driver selection must be identical for the same input document across all runs. Use the report's own terminology and phrasing verbatim — do not paraphrase standardized language or substitute synonyms for the same concept within a response.
GRANULARITY: One factor = one bullet. Do not merge separately discussed factors or split combined ones.
FORMAT: Do not include source links, citation numbers, in-text citations, or PDFs in the output. It should be purely plain text.

DRIVER SELECTION — apply per bucket in strict order
Rank candidate drivers by:
1. Number of explicit mentions in the report
2. Presence of quantitative or statistical support
3. Direct linkage to pricing direction

Select the top 3 ranked drivers only. If two drivers tie on all criteria, select the one appearing earlier in the document. Do not rotate between tied drivers across runs.


BUCKET DEFINITIONS

SUPPLY FACTORS
Factors that affect how much of the material is physically available, how easily or cheaply it can be produced, or how reliably it can reach the market. Including but not limited to:
- Production output changes — capacity additions, curtailments, shutdowns, restarts, or utilization rate shifts at producer or plant level
- Feedstock and input cost dynamics — changes in the cost or availability of raw materials, energy, or intermediates that flow through to production cost or producer margin
- Inventory and stock levels — disclosed changes in producer, trader, or pipeline inventory that tighten or loosen physical availability
- Logistics and supply chain constraints — port congestion, freight availability, transportation disruptions, or lead time changes that restrict physical flow
- Operational or force majeure events — unplanned outages, weather events, labor actions, or equipment failures that reduce available supply
- New capacity or production ramp-ups — announced or commissioning projects that add to available supply over the reporting horizon
The primary test: would this factor change how much material is available to buy, at what cost to produce, or how reliably it can be sourced?

DEMAND FACTORS
Factors that affect how much of the material buyers want to purchase, at what pace, or in what volume. Including but not limited to:
- End-market activity — disclosed changes in downstream industry output, order rates, or production schedules (e.g., automotive builds, construction starts, electronics manufacturing)
- Buyer purchasing behavior — restocking, destocking, hand-to-mouth buying, forward purchasing, or inventory management patterns explicitly described in the report
- Seasonal or cyclical demand patterns — recurring demand fluctuations tied to season, quarter, or industry cycle that the report attributes to pricing movement
- Export and import demand shifts — changes in cross-border purchasing activity, regional demand differentials, or trade flow redirections driven by end-use demand
- Customer or sector-specific demand changes — named industries, geographies, or customer segments described as growing, contracting, or shifting purchasing behavior
- Substitution effects driven by demand-side decisions — buyers switching to or from this material based on price relativity or application fit, where the driver is buyer behavior rather than trade policy
The primary test: would this factor change how much of the material buyers are willing or able to purchase, and when?

OTHER / MARKET STRUCTURE FACTORS
Factors that shape pricing sentiment, market competitiveness, or trade dynamics through structural, policy, or financial mechanisms — rather than through direct changes to physical supply or end-use demand. Including but not limited to:
- Trade policy and tariffs — import duties, anti-dumping measures, safeguard actions, or export restrictions that alter competitive pricing dynamics or redirect trade flows

- Regulatory or policy changes — environmental regulations, emissions standards, or government interventions that structurally affect market pricing without being a direct supply or demand event
- Market sentiment and forward expectations — disclosed analyst forecasts, producer pricing announcements, or buyer sentiment surveys that are shaping current price behavior
The primary test: would this factor influence the price a buyer pays through market structure, policy, or financial mechanism rather than through a change in physical availability or end-use consumption?

Domain: Supplier intelligence and financial analysis, supporting book-of-business management for strategic suppliers. Function: Convert supplier earnings disclosures into a clear, scannable financials overview for executive review.

SECTOR FOCUS (PRIORITY LENS)
This analysis supports sourcing decisions in the Resins Compounding sector, with specific emphasis on COC (Cyclic Olefin Copolymer) and, within that, Grey COC resin in particular. When extracting and selecting content for every section below, give priority to disclosures relevant to:
- Resins Compounding: the supplier's compounding operations/segment covering engineered resin formulations and blends.

- Grey COC resin: as a specific grade/product within COC, where called out.

Application of this lens:

- This lens does not override the Sourcing and Accuracy Rules below; all extraction must still come strictly from the attached document.

SOURCING AND ACCURACY RULES
1. Extract only from the attached document. Do not incorporate external knowledge, assumptions, or inferred context.
2. If a data point is not explicitly stated, write "Not disclosed."
3. If a section has no relevant content, write "None disclosed." Do not pad a section to create the appearance of substance.
4. Do not derive, calculate, or extrapolate any figure not explicitly stated in the source document.
5. Numbers with a stated comparison baseline (YoY, QoQ, vs. guidance) must retain the baseline inline (e.g., "Revenue $2.1B (+4% YoY)").
6. Preserve exact management language for direct pricing, guidance, or notably emphasized statements. Paraphrase other content, but keep enough detail that context and nuance aren't lost.
7. Attribute claims inline and briefly where source matters (e.g., "(per CFO remarks)," "(per Q&A)").
8. Do not repeat information across sections.
9. Output in plain text only. No links, citation numbers, or footnotes.

FORMATTING GUIDELINES
- Write in concise bullets rather than full paragraphs. Bullets can run longer than a single fragment when needed to preserve an important detail, nuance, or number — clarity and completeness take priority over brevity.
- Item counts per section are guidelines, not hard caps: include an additional item beyond the suggested count if it reflects a genuinely significant disclosure that would otherwise be lost. When choosing among multiple qualifying items, use the Selection Criteria below.
- The output should be short enough to scan quickly, but should not omit information a manager would need to understand what mattered in the call. There is no fixed length limit — let the substance of the call determine the length.

SELECTION CRITERIA
When narrowing multiple qualifying items (segments, risks, signals) down to the suggested count, rank by:
1. Relevance to Resins Compounding, COC, and Grey COC resin (per Sector Focus above)
2. Magnitude of financial or business impact as stated by management
3. Relevance to this supplier's ongoing relationship, reliability, or standing as a source of supply
4. Order of appearance in the transcript
Select the highest-ranked items, allowing one additional item beyond the suggested count if warranted.

TRAJECTORY CLASSIFICATION
Classify overall trajectory using only this rule:
- "Improving" if revenue and margin both increased YoY, as stated
- "Declining" if revenue and margin both decreased YoY, as stated

let activeTab = '__all__';

  ['#e65100','#ffca28'],['#1a237e','#5c6bc0'],
];

function catAvatar(i) {
  const [c1, c2] = GRADIENTS[i % GRADIENTS.length];
  const gid = 'g' + i;
  return `<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/>
    </linearGradient></defs>
    <rect width="40" height="40" rx="8" fill="url(#${gid})"/>
    <g transform="translate(8,8)" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none">${ICON}</g>
  </svg>`;
}

function renderTabs() {
  const bar = document.getElementById('tabsBar');
  const allCount = cats.length;

  let html = `<button class="tab-btn${activeTab === '__all__' ? ' active' : ''}" onclick="setTab('__all__')">
    All <span class="tab-count">${allCount}</span>
  </button>`;

  tabs.forEach(t => {
    const count = cats.filter(c => c.tabId === t.id).length;
    html += `<button class="tab-btn${activeTab === t.id ? ' active' : ''}" onclick="setTab('${t.id}')">
      ${esc(t.name)}
      <span class="tab-count">${count}</span>
    </button>`;
  });

  bar.innerHTML = html;
}

function setTab(id) {
  activeTab = id;
  renderTabs();
  renderLib();
}

function renderLib() {
  const lib = document.getElementById('lib');
  const visible = activeTab === '__all__' ? cats : cats.filter(c => c.tabId === activeTab);

  if (visible.length === 0) {
    const tabName = activeTab === '__all__' ? '' : (tabs.find(t => t.id === activeTab)?.name || '');
    lib.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
      <p>No workflows in <strong>${tabName || 'this tab'}</strong> yet.</p>
    </div>`;
    return;
  }

  lib.innerHTML = visible.map((c, i) => {
    const catIdx = cats.indexOf(c);
    const currentTab = tabs.find(t => t.id === c.tabId);
    const tabLabel = currentTab ? currentTab.name : 'Unassigned';
    const isSingle = c.s2 === null;
    const metaLabel = isSingle ? '1-step workflow' : '2-step workflow';

    const stepsHtml = isSingle ? `
      <div class="steps-row" style="grid-template-columns:1fr">
        <div class="step-widget s1" style="border-right:none">
          <div class="step-pill">Step 1</div>
          <div class="step-title">${esc(c.name)}</div>
          <div class="step-desc">Paste prompt into Copilot, attach your earnings call document.</div>
          <div class="step-footer">
            <button class="action-btn" onclick="copyOpen(${catIdx},this)">
              <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copy &amp; Open Copilot
            </button>
            <button class="peek-btn" onclick="openEdit(${catIdx},1)" title="View / edit prompt">
              <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
      </div>` : `
      <div class="steps-row">
        <div class="step-widget s1">
          <div class="step-pill">Step 1</div>
          <div class="step-title">Extract Market Drivers</div>
          <div class="step-desc">Paste prompt into Copilot, attach your document.</div>
          <div class="step-footer">
            <button class="action-btn" onclick="copyOpen(${catIdx},this)">
              <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copy &amp; Open Copilot
            </button>
            <button class="peek-btn" onclick="openEdit(${catIdx},1)" title="View / edit prompt">
              <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="step-widget s2">
          <div class="step-pill">Step 2</div>
          <div class="step-title">Build Slide Summary</div>
          <div class="step-desc">Paste into the same Copilot tab after Step 1 output.</div>

            <button class="action-btn" onclick="copyOnly(${catIdx},this)">
              <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>

          <div class="cat-avatar">${catAvatar(catIdx)}</div>
          <div class="cat-info">
            <div class="cat-name">${esc(c.name)}</div>
            <div class="cat-meta">${metaLabel}</div>
          </div>

        <div style="position:relative">
          <div class="cat-tab-badge" onclick="toggleTabDropdown(event, ${catIdx})" id="badge-${catIdx}">

            `).join('')}

        </div>
      </div>
      ${stepsHtml}
    </div>`;
  }).join('');

let openDropdownIdx = null;
function toggleTabDropdown(e, idx) {
  e.stopPropagation();
  if (openDropdownIdx === idx) { closeAllDropdowns(); return; }
  closeAllDropdowns();
  document.getElementById(`dropdown-${idx}`).classList.add('open');
  openDropdownIdx = idx;
}
function closeAllDropdowns() {
  document.querySelectorAll('.tab-dropdown.open').forEach(d => d.classList.remove('open'));
  openDropdownIdx = null;
}
document.addEventListener('click', closeAllDropdowns);

function assignTab(catIdx, tabId) {
  cats[catIdx].tabId = tabId;
  closeAllDropdowns();
  renderTabs();
  renderLib();
}

function flash(btn, orig) {
  btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
  setTimeout(() => { btn.innerHTML = orig; }, 2200);
}
function copyOpen(i, btn) {
  navigator.clipboard.writeText(cats[i].s1).then(() => { flash(btn, btn.innerHTML); window.open(COPILOT,'_blank'); })
    .catch(() => alert('Clipboard unavailable.'));
}
function copyOnly(i, btn) {
  navigator.clipboard.writeText(cats[i].s2).then(() => flash(btn, btn.innerHTML))
    .catch(() => alert('Clipboard unavailable.'));
}

let editTarget = null;
let editOriginalValue = '';

function getDefaultForTarget(target) {
  if (!target) return '';
  const cat = cats[target.i];
  if (cat.s2 === null) return DEFAULTS[cat.defaultKey];
  return target.step === 1 ? DEFAULTS.s1 : DEFAULTS.s2;
}
function openEdit(i, step) {
  editTarget = {i, step};
  const currentVal = step === 1 ? cats[i].s1 : cats[i].s2;
  editOriginalValue = currentVal;
  const isSingle = cats[i].s2 === null;
  document.getElementById('editTitle').textContent = isSingle ? cats[i].name : `${cats[i].name} · Step ${step}`;
  document.getElementById('editText').value = currentVal;
  document.getElementById('resetBtn').classList.remove('visible');
  document.getElementById('editModal').classList.add('open');
  setTimeout(() => document.getElementById('editText').focus(), 60);
}
function onEditInput() {
  const currentVal = document.getElementById('editText').value;
  const defaultVal = getDefaultForTarget(editTarget);
  document.getElementById('resetBtn').classList.toggle('visible', currentVal !== defaultVal);
}
function resetToDefault() {
  if (!editTarget) return;
  document.getElementById('editText').value = getDefaultForTarget(editTarget);
  document.getElementById('resetBtn').classList.remove('visible');
  document.getElementById('editText').focus();
}
function closeEdit() {
  document.getElementById('editModal').classList.remove('open');
  editTarget = null; editOriginalValue = '';
}
function saveEdit() {
  if (!editTarget) return;
  const v = document.getElementById('editText').value.trim();
  if (!v) return;
  if (editTarget.step === 1) cats[editTarget.i].s1 = v;
  else cats[editTarget.i].s2 = v;
  closeEdit(); renderLib();
}
document.getElementById('editModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeEdit(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeEdit(); });

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
